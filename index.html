<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nishant's NEET Planner</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #050816;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #8b5cf6;
    }

    .card {
      background: #111827;
      border: 2px solid #7c3aed;
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 25px;
    }

    .card h2 {
      margin-bottom: 10px;
      color: #a78bfa;
    }

    .card p {
      color: #cbd5e1;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #7c3aed;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #6d28d9;
    }

    .section {
      display: none;
      margin-top: 20px;
      padding: 20px;
      background: #1e293b;
      border-radius: 15px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #334155;
      color: white;
    }

    ul {
      margin-top: 15px;
      padding-left: 20px;
    }

    li {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>📚 Nishant's NEET Planner</h1>

  <div class="card">
    <h2>📅 Daily Planner</h2>
    <p>Track your daily NEET preparation tasks.</p>
    <button onclick="toggleDaily()">Open Daily Planner</button>

    <div class="section" id="dailySection">
      <h3>Today's Tasks</h3>

      <input type="text" id="taskInput" placeholder="Enter your task">
      <button style="margin-top:10px" onclick="addTask()">Add Task</button>

      <ul id="taskList"></ul>
    </div>
  </div>

  <div class="card">
    <h2>🎯 Yearly Planner</h2>
    <p>Set yearly NEET goals and targets.</p>
    <button onclick="toggleYearly()">Open Yearly Planner</button>

    <div class="section" id="yearlySection">
      <textarea rows="6" placeholder="Write your yearly NEET goals..."></textarea>
    </div>
  </div>
</div>

<script>
  function toggleDaily() {
    const section = document.getElementById('dailySection');
    section.style.display = section.style.display === 'block' ? 'none' : 'block';
  }

  function toggleYearly() {
    const section = document.getElementById('yearlySection');
    section.style.display = section.style.display === 'block' ? 'none' : 'block';
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    const task = input.value;

    if(task.trim() === '') return;

    const li = document.createElement('li');
    li.textContent = '✅ ' + task;

    document.getElementById('taskList').appendChild(li);

    input.value = '';
  }
</script>

</body>
</html>
